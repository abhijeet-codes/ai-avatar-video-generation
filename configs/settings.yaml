# Avatar Pipeline — Global Settings
# ==================================

# ElevenLabs API key (read from env var ELEVENLABS_KEY if empty)
elevenlabs_key: ""

# Model directories
musetalk_dir: "~/MuseTalk"
sadtalker_dir: "~/SadTalker"

# Default avatar image (relative to project root)
avatar_path: "data/avatars/avatar.png"

# Video defaults
default_fps: 25
default_orientation: "9:16"

# Output resolutions by orientation
output_resolution:
  "9:16": "1080x1920"
  "16:9": "1920x1080"
  "1:1": "1080x1080"

# Lip-sync engine settings
lipsync:
  default_engine: "musetalk"        # musetalk | sadtalker | sadtalker_hd
  expression_scale: 1.0              # SadTalker expression intensity (0.0–3.0)

# MuseTalk runtime settings
musetalk:
  fps: 25
  use_float16: true
  default_bbox_shift: 0
  default_batch_size: 8

# Local TTS settings
# engine options:
#   kokoro  — hexgrad/Kokoro-82M, fast, multilingual, runs on Apple Silicon MPS
#   bark    — suno/bark (full, ~5 GB) or suno/bark-small (~2 GB)
#             Natural, expressive voice with non-verbal cues support
#             Recommended model for this system: suno/bark (M4 Pro 24 GB)
#   mlx     — Qwen3-TTS via mlx-audio, Apple Silicon native
tts:
  engine: "kokoro"
  default_voice: "af_heart"   # American female, high quality (Kokoro)
  speed: 1.0
  lang_code: "a"              # 'a'=American English, 'b'=British English

# Bark TTS settings (used when tts.engine = "bark")
bark:
  model_id: "suno/bark"       # full model — best quality for M4 Pro 24 GB
  default_voice: "en_speaker_6"  # clear neutral English male
  # Swap to "suno/bark-small" to reduce memory usage to ~4 GB
